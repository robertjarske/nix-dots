name: Check
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Lint (statix)
        run: nix run nixpkgs#statix -- check .
      - name: Lint (deadnix)
        run: nix run nixpkgs#deadnix -- --fail .
      - name: Format check (alejandra)
        run: nix fmt -- --check .
      - name: Validate flake schema
        run: nix flake check
      - name: Evaluate bastion configuration
        run: |
          echo "## bastion" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          nix build .#nixosConfigurations.bastion.config.system.build.toplevel --dry-run 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Evaluate forge configuration
        run: |
          echo "## forge" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          nix build .#nixosConfigurations.forge.config.system.build.toplevel --dry-run 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
