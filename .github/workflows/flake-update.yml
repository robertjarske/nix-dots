name: Update flake inputs
on:
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v21
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Update flake inputs
        run: nix flake update
      - uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update flake.lock"
          title: "chore: update flake inputs"
          body: |
            Automated weekly update of flake inputs via `nix flake update`.

            The CI check will build both hosts and show an nvd diff of what changed.
          branch: deps/flake-update
          delete-branch: true
